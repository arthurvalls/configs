"$schema" = 'https://starship.rs/config-schema.json'

# Minimal single-line prompt.
# Colors use named ANSI values, so they follow the active terminal theme
# (Gruber Darker in kitty today, anything you switch to later).
format = """
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$lua\
$python\
$character"""

# Right side: directory, slow-command duration, then clock at the far edge.
right_format = """$directory$cmd_duration$time"""

[directory]
style = "bold blue"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "purple"
format = "[$symbol$branch ]($style)"

[git_status]
style = "red"
format = '([$all_status$ahead_behind ]($style))'

[cmd_duration]
min_time = 2000          # only show when a command takes longer than 2s
style = "yellow"
format = '[$duration ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bright-black"
format = '[$time]($style)'
[character]
# success_symbol = "[λ](bold green)" # λ
# error_symbol = "[λ](bold red)"
# vimcmd_symbol = "[λ](bold yellow)"
success_symbol = "[::](bold green)" # λ
error_symbol = "[::](bold red)"
vimcmd_symbol = "[::](bold yellow)"


# --- Language indicators (green, symbol only — no version, shown inside a matching project) ---


[nodejs]
symbol = " "
style = "green"
format = '[$symbol]($style)'

[c]
symbol = " "
style = "green"
format = '[$symbol]($style)'

[cpp]
symbol = " "
style = "green"
format = '[$symbol]($style)'

[rust]
symbol = " "
style = "green"
format = '[$symbol]($style)'

[golang]
