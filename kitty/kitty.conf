# ==============================================================================
# Fonts & Typography
# ==============================================================================
# font_family monospace
font_family NotoSans Nerd Font Propo

bold_font             auto
italic_font           auto
bold_italic_font      auto
font_size             10.0

disable_ligatures     never

# Advanced Rendering (Great for Neovim)
text_composition_strategy legacy
undercurl_style           thick-dense

# Symbol Mapping
# Berkeley Mono (or Fira) lacks some Nerd/Powerline glyphs. Route icon ranges 
# to a patched font so the bobthefish prompt & Claude status pills render.
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B7,U+E700-U+E8EF,U+EA60-U+EC1E,U+ED00-U+EFCE,U+F000-U+F2FF,U+F300-U+F381,U+F400-U+F533 NotoSansM Nerd Font Mono


# ==============================================================================
# Cursor & Mouse
# ==============================================================================
shell_integration            enabled no-cursor
cursor_shape                 underline
cursor_blink_interval        0

# Smooth Cursor Trail Animations
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 2

copy_on_select               yes
url_style                    curly


# ==============================================================================
# Window & Layouts
# ==============================================================================
hide_window_decorations yes
remember_window_size    yes
initial_window_width    90c
initial_window_height   25c

# Spacing & Borders
window_padding_width       10
window_margin_width        2
single_window_margin_width 0
draw_minimal_borders       yes
window_border_width        1pt
# active_border_color      #ff69b4
# inactive_border_color    #444444

# Layouts
# splits: manual side-by-side panes | stack: maximize one
# tall/fat/grid: auto-arranging geometries | Cycle with ctrl+shift+L
enabled_layouts splits,stack,tall,fat,grid


# ==============================================================================
# Tabs
# ==============================================================================
tab_bar_edge         top
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_min_tabs     2

# Custom Python Tab Bar (Commented out to preserve your Claude setup)
# tab_bar_style          custom
# tab_bar_custom_template ~/.config/kitty/tab_bar.py

# Claude Code Status Pills
# Hook ~/.claude/hooks/kitty-status.sh sets user_vars (cc_status_running/waiting/done/ready).
# Active states only render when their user_var is non-empty.
tab_title_template "{index}: {title}{fmt.bg.green}{fmt.fg.black}{tab.active_oldest_window.user_vars.cc_status_running}{fmt.bg.default}{fmt.fg.default}{fmt.bg.yellow}{fmt.fg.black}{tab.active_oldest_window.user_vars.cc_status_waiting}{fmt.bg.default}{fmt.fg.default}{fmt.bg.blue}{fmt.fg.white}{tab.active_oldest_window.user_vars.cc_status_done}{fmt.bg.default}{fmt.fg.default}{fmt.bg.cyan}{fmt.fg.black}{tab.active_oldest_window.user_vars.cc_status_ready}{fmt.bg.default}{fmt.fg.default}"


# ==============================================================================
# System & Performance
# ==============================================================================
auto_reload_config       yes
enable_audio_bell        no
scrollback_lines         10000

# Search Scrollback via Neovim
scrollback_pager nvim +"source /usr/share/nvim/runtime/macros/less.vim" -c "set nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd TermOpen * normal G" -

repaint_delay            10
input_delay              3
sync_to_monitor          no

# Neovim Sync Support
# Required for nvim <-> kitty colorscheme sync (see lua/config/terminal-sync.lua)
allow_remote_control     yes
env TERM=xterm-256color
enable_keyboard_protocol no


# ==============================================================================
# Keybindings
# ==============================================================================
map ctrl+q             no_op

# Clipboard
map ctrl+shift+c       copy_to_clipboard
map ctrl+shift+v       paste_from_clipboard

# Scrollback Search
map ctrl+shift+f       show_scrollback

# Kitten Hints (Regex Overlays)
map ctrl+shift+e       kitten hints
map ctrl+shift+p       kitten hints --type path --program @
map ctrl+shift+h       kitten hints --type hash --program @

# Window & Tab Management
map ctrl+shift+enter   launch --location=vsplit --cwd current
map ctrl+shift+space   select_tab  # Vertical tab picker (replaces hidden horiz tab bar)

# Font Size Zoom
map ctrl+plus          change_font_size all +1.0
map ctrl+equal         change_font_size all +1.0
map ctrl+minus         change_font_size all -1.0
map ctrl+0             change_font_size all 0


# ==============================================================================
# Background & Theme
# ==============================================================================
# Transparent window over the blurred circuit-schematic wallpaper. 
# The palette (current-theme.conf) tints over it for text readability. 
# Tweak opacity/background_tint (lower = circuit more visible). 
# Regenerate the image with assets/make-circuit-bg.py.
# 
# background_image            /home/arthur/.config/kitty/assets/circuit-blur.png
# background_image_layout     scaled
# background_opacity          0.90
# dynamic_background_opacity  yes
# background_tint             0.99

# Floating Window Logo (Alternative to full background image)
# window_logo_path            /home/arthur/.config/kitty/assets/logo.png
# window_logo_position        bottom-right
# window_logo_alpha           0.2

# BEGIN_KITTY_THEME
# Active palette: monochrome greyscale, vantablack-like bg (driven by nvim's 
# ColorScheme autocmd in lua/config/terminal-sync.lua, which copies 
# ~/.config/kitty/gruvbox.conf into current-theme.conf and overlays nvim's 
# runtime highlights).
#
# include ./gruber-lemon-dark.conf
# include ./gruvbox_light.conf
include ./nord.conf
# END_KITTY_THEME
