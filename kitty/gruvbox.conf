# vim:ft=kitty
## name:     Monochrome (Vantablack Blueprint)
## blurb:    Neutral grey + black + white palette on a vantablack-like (#0a0a0a)
##           background, designed to sit over the blurred blueprint wallpaper.
##           Baseline for nvim ellisonleao/gruvbox.nvim with contrast=hard,
##           transparent_mode=true and greyscale palette_overrides.
##           terminal-sync.lua overlays the live Normal fg + cursor/selection
##           (Normal.bg is transparent, so kitty keeps this background).

foreground               #d8d8d8
background               #0a0a0a
selection_foreground     #e8f4fa
selection_background     #11463d
cursor                   #2ae8c8
cursor_text_color        #0a0a0a
url_color                #2ae8c8

active_border_color      #1f8f7e
inactive_border_color    #2a2a2a

# Mostly-greyscale ANSI with three signal hues: red (1/9) = delete, green (2/10)
# = add for diffs, and blue/cyan (4/12, 6/14) = the blueprint accent (prompts,
# dirs, links). yellow (3/11) + magenta (5/13) stay grey on the brightness ladder
# so the accent stays special. color0 kept at #2a2a2a, visible on vantablack.
color0   #2a2a2a
color8   #6a6a6a
color1   #c46b6b
color9   #de8c8c
color2   #7fb07f
color10  #9ad19a
color3   #bcbcbc
color11  #d8d8d8
color4   #1fbfa6
color12  #4fe0c4
color5   #8a8a8a
color13  #aaaaaa
color6   #2ae8c8
color14  #79f0d8
color7   #c8c8c8
color15  #f0f0f0

active_tab_foreground    #cdf5ec
active_tab_background    #11463d
inactive_tab_foreground  #808080
inactive_tab_background  #0a0a0a

# Background: contour map of the Ackley optimization function (gruvbox-toned),
# Readability is BAKED INTO the PNG (very dark base, avg pixel ~(12,14,16), faint
# 1px contour lines) so code is legible even if background_tint is a no-op here.
# tint ALSO set high (0.85) belt-and-suspenders. scaled = fit to window. These
# override kitty.conf's globals (include is the last directive). IMPORTANT: a full
# kitty restart is required — `kitty @ load-config` / new tabs do NOT reload the
# background image.
background_opacity 1.0
dynamic_background_opacity yes
background_image /home/arthur/.config/kitty/assets/gruvbox-ackley.png
background_image_layout scaled
background_tint 0.85
