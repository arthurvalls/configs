# --- The 16 Terminal Colors ---

# Black (Used for deep backgrounds / dark borders)
color0  #2a2928
# Bright Black (Used for dimmed text, comments, empty progress bars)
color8  #5e5c58

# Red (Muted, warm red for errors)
color1  #cc7874
color9  #d68480

# Green (Used for the local arrow and success states)
color2  #8abf7c
color10 #97cc89

# Yellow / Orange (The prominent accent color for asterisks and progress)
color3  #d38f58
color11 #e39e66

# Blue (Soft, muted blue)
color4  #7da8c7
color12 #8ab6d6

# Magenta (Warm, earthy purple)
color5  #b38fad
color13 #c49ec0

# Cyan (Used for the web addresses and links)
color6  #80b6c4
color14 #8ec7d6

# White (Standard text)
color7  #d5d1c8
# Bright White (Highlighted text)
color15 #f2ede4
