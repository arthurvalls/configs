# vim:ft=kitty
## name:     YoRHa
## blurb:    NieR:Automata "YoRHa menu" palette — warm bone/khaki (#cdc8ae) text
##           on a darkened warm-black (#0f0e0a) background, near-monochrome with
##           sparse rust/ochre/amber/olive accents and a reserved cyan "hack"
##           spark. Matches nvim colors/yorha.lua. terminal-sync.lua resolves
##           this file by the colorscheme name (`yorha` -> yorha.conf).

foreground               #cdc8ae
background               #0f0e0a
selection_foreground     #cdc8ae
selection_background     #322f26
cursor                   #c99b6e
cursor_text_color        #0f0e0a
url_color                #c99b6e

active_border_color      #8a6f4a
inactive_border_color    #221f18

# Warm bone-on-black ANSI. red (1/9) = alert/delete, olive-green (2/10) = add,
# amber (3/11) = numbers/warn, teal (4/12, 6/14) = the reserved cyan hack accent,
# magenta (5/13) = dusty rust-brown stand-in (NieR has no real blue/magenta).
color0   #1a1913
color8   #322f26
color1   #c84a3c
color9   #d9614f
color2   #7c8a4e
color10  #8a8a5c
color3   #c9a227
color11  #d8b23a
color4   #6fb7b0
color12  #84c8c0
color5   #b0846e
color13  #c99b6e
color6   #6fb7b0
color14  #84c8c0
color7   #cdc8ae
color15  #e6e1c8

active_tab_foreground    #0f0e0a
active_tab_background     #c99b6e
inactive_tab_foreground  #8a8674
inactive_tab_background  #0f0e0a

# YoRHa-menu background: the yorha.png wallpaper, OPAQUE (no transparency),
# darkened by background_tint toward the warm-black bg for readability.
# layout scaled = fit the 2560x1440 image to the window. These override
# kitty.conf's globals because `include current-theme.conf` is the last
# directive in kitty.conf. NOTE: applied on kitty (re)start only — nvim's live
# `kitty @ set-colors` swaps the palette but not the background image/opacity.
background_opacity 1.0
dynamic_background_opacity yes
background_image /home/arthur/.config/kitty/assets/yorha.png
background_image_layout scaled
background_tint 0.85
