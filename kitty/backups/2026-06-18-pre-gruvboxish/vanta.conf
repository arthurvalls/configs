# vim:ft=kitty
## name:     Vanta
## blurb:    Standalone monochrome (grey+black+white) palette on a vantablack-like
##           (#0a0a0a) background with a neon-turquoise accent and red/green diff
##           signals. Built from the gruvbox-vantablack iteration but independent
##           of gruvbox. Matches nvim colors/vanta.lua. terminal-sync.lua resolves
##           this file by the colorscheme name (`vanta` -> vanta.conf).

foreground               #d8d8d8
background               #0a0a0a
selection_foreground     #e8f4fa
selection_background     #11463d
cursor                   #2ae8c8
cursor_text_color        #0a0a0a
url_color                #2ae8c8

active_border_color      #1f8f7e
inactive_border_color    #2a2a2a

# Mostly-greyscale ANSI with three signal hues: red (1/9) = delete, green (2/10)
# = add for diffs, blue/cyan (4/12, 6/14) = the neon turquoise accent. yellow
# (3/11) + magenta (5/13) stay grey. color0 kept at #2a2a2a, visible on vantablack.
color0   #2a2a2a
color8   #6a6a6a
color1   #c46b6b
color9   #de8c8c
color2   #7fb07f
color10  #9ad19a
color3   #bcbcbc
color11  #d8d8d8
color4   #1fbfa6
color12  #4fe0c4
color5   #8a8a8a
color13  #aaaaaa
color6   #2ae8c8
color14  #79f0d8
color7   #c8c8c8
color15  #f0f0f0

active_tab_foreground    #cdf5ec
active_tab_background    #11463d
inactive_tab_foreground  #808080
inactive_tab_background  #0a0a0a
