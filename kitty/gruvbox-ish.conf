# vim:ft=kitty
## name:     Gruvbox-ish (Dark Hard)
## blurb:    Port of the Zed "Gruvbox ish Dark Hard" theme
##           (github.com/tristan-f-r/zed-gruvbox-ish, themes/gruvbox-ish.json).
##           Cream fg #dfbf8e on dark0_hard #1d2021; ANSI taken verbatim from the
##           source's terminal.ansi.*. Matches nvim colors/gruvbox-ish.lua.
##           terminal-sync.lua resolves this file by colorscheme name.

foreground               #dfbf8e
background               #1d2021
selection_foreground     #dfbf8e
selection_background     #504945
cursor                   #dfbf8e
cursor_text_color        #1d2021
url_color                #83a598

active_border_color      #689d6a
inactive_border_color    #3c3836

# ANSI verbatim from gruvbox-ish.json terminal.ansi.*
color0   #282828
color8   #928374
color1   #d75f5f
color9   #d75f5f
color2   #a8a81c
color10  #8b9553
color3   #d69617
color11  #cea64a
color4   #458588
color12  #83a598
color5   #b16286
color13  #d3869b
color6   #689d6a
color14  #87af87
color7   #a89984
color15  #dfbf8e

active_tab_foreground    #1d2021
active_tab_background     #689d6a
inactive_tab_foreground  #a89984
inactive_tab_background  #1d2021

# Background: contour map of the Ackley optimization function (gruvbox-toned),
# Readability is BAKED INTO the PNG (very dark base, avg pixel ~(12,14,16), faint
# 1px contour lines) so code is legible even if background_tint is a no-op here.
# tint ALSO set high (0.85) belt-and-suspenders. scaled = fit to window. These
# override kitty.conf's globals (include is the last directive). IMPORTANT: a full
# kitty restart is required — `kitty @ load-config` / new tabs do NOT reload the
# background image.
background_opacity 1.0
dynamic_background_opacity yes
background_image /home/arthur/.config/kitty/assets/gruvbox-ackley.png
background_image_layout scaled
background_tint 0.85
