# Color scheme generated from custom palette
# Place in ~/.config/kitty/kitty.conf or save as a .conf and include it

# Basic colors
background              #262626
foreground              #FFCB83
selection_background    #6A4F2A
selection_foreground    #FAFAFF

# Cursor
cursor                  #FFCB83
cursor_text_color       #262626

# URL underline color when hovering
url_color               #F79500

# Window border colors
active_border_color     #FC5E00
inactive_border_color   #6A4F2A
bell_border_color       #CAAF00

# Tab bar
active_tab_background   #FC5E00
active_tab_foreground   #262626
inactive_tab_background #6A4F2A
inactive_tab_foreground #FFC88A
tab_bar_background      #000000

# Normal colors
color0  #000000
color1  #C13900
color2  #A4A900
color3  #CAAF00
