# Gruber Apple Dark 🍎
# Kitty Terminal Theme translated from VS Code JSON

# ---------------------------------------------------------
# Basic Colors
# ---------------------------------------------------------
background              #181818
foreground              #dddddd
selection_background    #303030
selection_foreground    #dddddd

# ---------------------------------------------------------
# Cursor
# ---------------------------------------------------------
# Cursor color matched to "editorCursor.foreground"
cursor                  #FF264E
cursor_text_color       #181818

# ---------------------------------------------------------
# URL Underline
# ---------------------------------------------------------
# Matched to "textLink.activeForeground"
url_color               #73c936

# ---------------------------------------------------------
# Tab Bar
# ---------------------------------------------------------
active_tab_foreground   #181818
active_tab_background   #FF264E
inactive_tab_foreground #dddddd
inactive_tab_background #282828
tab_bar_background      #181818

# ---------------------------------------------------------
# Window Borders
# ---------------------------------------------------------
active_border_color     #FF264E
inactive_border_color   #282828

# ---------------------------------------------------------
# Terminal Colors (0-15)
# ---------------------------------------------------------

# Black
color0  #181818
color8  #6b6b6b

# Red (Matched to keywords/operators)
color1  #FF264E
color9  #FF264E

# Green (Matched to strings/added diffs)
color2  #73c936
color10 #73c936

# Yellow 
# (Note: Yellow wasn't explicitly defined in the JSON, 
# so I'm using standard Gruber Darker yellow as a fallback to prevent invisible CLI text)
color3  #ffdd33
color11 #ffdd33

# Blue (Matched to metaprogramming/macros)
color4  #00d5ff
color12 #00d5ff

# Magenta (Matched to constants/numbers)
color5  #9e95c7
color13 #9e95c7

# Cyan (Reusing the bright blue from CSS functions/decorators)
color6  #00d5ff
color14 #00d5ff

# White (Matched to foreground)
color7  #dddddd
color15 #ffffff
