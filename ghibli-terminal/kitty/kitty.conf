# kitty.conf — a cozy, lightweight terminal for everyday use 🌱
#
# Font is JetBrains Mono Nerd Font: it already contains every icon and
# symbol the prompt uses, so there's nothing extra to configure.
# The colours live in totoro.conf (included at the bottom).

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# kitty reloads this file automatically whenever you save it.

# --- Shell ---
# Always open the fish shell here, even if the system's default shell is
# something else (like zsh). fish loads starship (the pretty prompt) itself.
shell fish

# --- Window ---
window_padding_width 12
remember_window_size yes
initial_window_width  92c
initial_window_height 26c
draw_minimal_borders  yes

# --- Cursor ---
cursor_shape          beam
cursor_blink_interval 0.5

# --- Mouse & scrolling ---
copy_on_select   yes
scrollback_lines 10000
url_style        curly

# --- Bell ---
enable_audio_bell no

# --- Tabs (the bar only shows once you open a second tab) ---
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_bar_edge        top
active_tab_foreground   #1b211a
active_tab_background   #a9c08f
inactive_tab_foreground #d8d3bd
inactive_tab_background #2b322a

# --- Keyboard shortcuts ---
# copy / paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
# new tab / split window
map ctrl+shift+t     new_tab
map ctrl+shift+enter new_window
# make text bigger / smaller / reset
map ctrl+plus  change_font_size all +1.0
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# --- Background: a dimmed Totoro behind the text ---
# totoro-bg.jpg is a darkened, softened copy of the wallpaper so text stays
# readable. background_tint blends the forest colour over it: raise it toward
# 1.0 for crisper text, lower it toward 0.0 to see Totoro more clearly.
background_image totoro-bg.jpg
background_image_layout cscaled
background_tint 0.55

# --- Theme ---
include ./totoro.conf
