# Totoro — forest & cream 🌱
# A cozy Studio-Ghibli palette: dark-forest background, warm cream text,
# leaf-green and acorn-brown accents, tuned to match the Totoro wallpaper
# in ../wallpaper/totoro.jpg.
#
# To recolour your terminal, just edit the hex values below and save —
# kitty reloads the config automatically the moment you save.

background            #1b211a
foreground            #e8e4d0
cursor                #a9c08f
cursor_text_color     #1b211a
selection_background  #3d453a
selection_foreground  #f4f1e4
url_color             #8bb3ab

# --- 16-colour ANSI palette ---

# black  (dark moss)
color0  #2b322a
color8  #4a5347

# red    (clay / acorn)
color1  #c96f5b
color9  #d98b76

# green  (leaf)
color2  #7ea77b
color10 #a9c08f

# yellow (wheat / acorn gold)
color3  #d9b26a
color11 #e6c98a

# blue   (dusty teal sky through the trees)
color4  #7aa6a0
color12 #97c0b9

# magenta (dusk flower)
color5  #b58cad
color13 #cba7c4

# cyan   (soft teal)
color6  #8bb3ab
color14 #a7cbc3

# white  (cream)
color7  #d8d3bd
color15 #f4f1e4
